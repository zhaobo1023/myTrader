# myTrader Nginx Configuration (ECS)

upstream fastapi_backend {
    # 本地 systemd 服务
    server 127.0.0.1:8000 fail_timeout=5s max_fails=3;
    keepalive 32;
}

upstream nextjs_frontend {
    # Next.js 默认端口 3000
    server 127.0.0.1:3000 fail_timeout=5s max_fails=3;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # HTTPS 重定向（如果配置了 SSL）
    # return 301 https://$server_name$request_uri;

    # 生产环境建议启用
    # server_name your-domain.com www.your-domain.com;

    # Max request body size (for file uploads)
    client_max_body_size 50m;

    # 日志目录：/var/log/nginx/
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;

    # ============================================================
    # API 路由 (/api/*)
    # ============================================================
    location /api/ {
        proxy_pass http://fastapi_backend/;

        # 代理头信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # SSE (Server-Sent Events) 支持 - 用于流式响应
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;

        # keepalive
        proxy_set_header Connection "upgrade";
    }

    # 健康检查（不记录日志）
    location /health {
        proxy_pass http://fastapi_backend/health;
        access_log off;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # ============================================================
    # 前端路由 (所有其他请求)
    # ============================================================
    location / {
        proxy_pass http://nextjs_frontend;

        # 代理头信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 支持 WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 缓存静态资源
        proxy_cache_bypass $http_cache_control;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 静态文件缓存（可选，如果 Next.js 的公开文件）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://nextjs_frontend;
        proxy_cache_valid 200 30d;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

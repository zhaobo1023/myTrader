# myTrader Nginx Configuration

# 后端 API 服务（通过 Docker 网络访问）
upstream fastapi_backend {
    server mytrader-api:8000 fail_timeout=5s max_fails=3;
    keepalive 32;
}

# 前端服务（通过 Docker 网络访问）
upstream nextjs_frontend {
    server mytrader-web:3000 fail_timeout=5s max_fails=3;
    keepalive 32;
}

# HTTP -> HTTPS 重定向
server {
    listen 80;
    server_name mytrader.cc www.mytrader.cc;
    return 301 https://$server_name$request_uri;
}

# IP 直接访问也重定向到域名
server {
    listen 80 default_server;
    server_name _;
    return 301 https://mytrader.cc$request_uri;
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    server_name mytrader.cc www.mytrader.cc;

    # SSL 证书
    ssl_certificate /etc/letsencrypt/live/mytrader.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mytrader.cc/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Max request body size
    client_max_body_size 50m;

    # ============================================================
    # 安全响应头
    # ============================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 日志
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;

    # ============================================================
    # API 路由 (/api/*) -> 后端 8000
    # ============================================================
    location /api/ {
        proxy_pass http://fastapi_backend;

        # 代理头信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # SSE 支持（流式响应）
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }

    # API 文档
    location /docs {
        proxy_pass http://fastapi_backend/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # OpenAPI JSON
    location /openapi.json {
        proxy_pass http://fastapi_backend/openapi.json;
        proxy_set_header Host $host;
    }

    # 健康检查
    location /health {
        proxy_pass http://fastapi_backend/health;
        access_log off;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # ============================================================
    # 前端路由 (/) -> Next.js 3000
    # ============================================================
    location / {
        proxy_pass http://nextjs_frontend;

        # 代理头信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 支持 WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

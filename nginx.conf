# myTrader Nginx Configuration

# 后端 API 服务（通过 Docker 网络访问）
upstream fastapi_backend {
    server mytrader-api:8000 fail_timeout=5s max_fails=3;
    keepalive 32;
}

# 前端服务（通过 Docker 网络访问）
upstream nextjs_frontend {
    server mytrader-web:3000 fail_timeout=5s max_fails=3;
    keepalive 32;
}

# HTTP -> HTTPS 重定向 (域名访问)
server {
    listen 80;
    server_name mytrader.cc www.mytrader.cc;
    return 301 https://mytrader.cc$request_uri;
}

# IP 直接访问 HTTP -> 直接关闭连接
server {
    listen 80 default_server;
    server_name _;
    return 444;
}

# IP 直接访问 HTTPS -> 直接关闭连接 (防止通过 IP:443 绕过域名)
server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/mytrader.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mytrader.cc/privkey.pem;

    return 444;
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    server_name mytrader.cc www.mytrader.cc;

    # SSL 证书
    ssl_certificate /etc/letsencrypt/live/mytrader.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mytrader.cc/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ============================================================
    # 安全响应头
    # ============================================================
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://mytrader.cc; frame-ancestors 'self'" always;

    # Max request body size
    client_max_body_size 50m;

    # 日志
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;

    # ============================================================
    # 屏蔽敏感端点 (生产环境不暴露 API 文档和指标)
    # ============================================================
    location = /docs { return 404; }
    location = /redoc { return 404; }
    location = /openapi.json { return 404; }
    location = /metrics { return 404; }

    # ============================================================
    # API 路由 (/api/*) -> 后端 8000
    # ============================================================
    location /api/ {
        proxy_pass http://fastapi_backend;

        # 代理头信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # SSE 支持（流式响应）
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;

        # HUP reload 期间短暂不可用的自动重试
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_timeout 5s;
        proxy_next_upstream_tries 2;
    }

    # 健康检查
    location /health {
        proxy_pass http://fastapi_backend/health;
        access_log off;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # ============================================================
    # 前端路由 (/) -> Next.js 3000
    # ============================================================
    location / {
        proxy_pass http://nextjs_frontend;

        # 代理头信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 支持 WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 维护页面（部署期间替代裸 502）
    error_page 502 503 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

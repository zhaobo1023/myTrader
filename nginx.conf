# myTrader Nginx Configuration (IP Access + Docker)

# 后端 API 服务（通过 Docker 网络访问）
upstream fastapi_backend {
    server mytrader-api:8000 fail_timeout=5s max_fails=3;
    keepalive 32;
}

# 前端服务（通过 Docker 网络访问）
upstream nextjs_frontend {
    server mytrader-web:3000 fail_timeout=5s max_fails=3;
    keepalive 32;
}

server {
    listen 80;
    # 支持 IP 访问（域名申请下来后改为您的域名）
    server_name 123.56.3.1 _;

    # Max request body size
    client_max_body_size 50m;

    # ============================================================
    # 安全响应头
    # ============================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 日志
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;

    # ============================================================
    # API 路由 (/api/*) -> 后端 8000
    # ============================================================
    location /api/ {
        proxy_pass http://fastapi_backend;

        # 代理头信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # SSE 支持（流式响应）
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }

    # API 文档（可选，生产环境可关闭）
    location /docs {
        proxy_pass http://fastapi_backend/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # OpenAPI JSON
    location /openapi.json {
        proxy_pass http://fastapi_backend/openapi.json;
        proxy_set_header Host $host;
    }

    # 健康检查
    location /health {
        proxy_pass http://fastapi_backend/health;
        access_log off;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # ============================================================
    # 前端路由 (/) -> Next.js 3000
    # ============================================================
    location / {
        proxy_pass http://nextjs_frontend;

        # 代理头信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 支持 WebSocket（Next.js 热重载）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}


# myTrader Nginx Configuration (Local Deployment)

upstream fastapi_backend {
    # Docker 容器中的 API 服务
    server api:8000 fail_timeout=5s max_fails=3;
    keepalive 32;
}

# upstream nextjs_frontend {
#     # 宿主机上的 Next.js 服务（如果有的话）
#     server host.docker.internal:3000 fail_timeout=5s max_fails=3;
#     keepalive 32;
# }

server {
    listen 80;
    server_name mytrader.cc www.mytrader.cc;

    # HTTPS 重定向（SSL 配置后取消注释）
    # return 301 https://mytrader.cc$request_uri;

    # Max request body size (for file uploads)
    client_max_body_size 50m;

    # ============================================================
    # 安全响应头 (Security Headers)
    # ============================================================
    # 防止点击劫持攻击
    add_header X-Frame-Options "SAMEORIGIN" always;
    # 防止 MIME 类型嗅探
    add_header X-Content-Type-Options "nosniff" always;
    # 启用浏览器 XSS 过滤
    add_header X-XSS-Protection "1; mode=block" always;
    # 限制引用来源
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # 内容安全策略 (根据实际需求调整)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;
    # 权限策略
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # 日志目录：/var/log/nginx/
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;

    # ============================================================
    # API 路由 (/api/*)
    # ============================================================
    location /api/ {
        proxy_pass http://fastapi_backend;

        # 代理头信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # SSE (Server-Sent Events) 支持 - 用于流式响应
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;

        # keepalive
        proxy_set_header Connection "upgrade";
    }

    # 健康检查（不记录日志）
    location /health {
        proxy_pass http://fastapi_backend/health;
        access_log off;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # ============================================================
    # 前端路由 (所有其他请求)
    # ============================================================
    # 注意：如果你的 Next.js 前端在服务器本地运行（端口 3000），
    # 注释掉下面的 location / 块，使用备选配置
    location / {
        # 临时返回 API 服务状态页面（待前端部署）
        return 200 '{"status":"running","message":"API is running at /api","health":"/health"}';
        add_header Content-Type application/json;

        # proxy_pass http://nextjs_frontend;
        # # 代理头信息
        # proxy_set_header Host $host;
        # proxy_set_header X-Real-IP $remote_addr;
        # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # proxy_set_header X-Forwarded-Proto $scheme;
        # # 支持 WebSocket（Next.js 开发模式热重载）
        # proxy_set_header Upgrade $http_upgrade;
        # proxy_set_header Connection "upgrade";
        # # 超时设置
        # proxy_connect_timeout 60s;
        # proxy_send_timeout 60s;
        # proxy_read_timeout 60s;
        # # 缓存静态资源
        # proxy_cache_bypass $http_cache_control;
        # add_header X-Cache-Status $upstream_cache_status;
    }

    # ============================================================
    # 备选配置：Next.js 在服务器本地运行（非 Docker）
    # ============================================================
    # 如果前端使用 systemd/pm2 等在本地运行，取消注释下面：
    #
    # location / {
    #     proxy_pass http://127.0.0.1:3000;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    # }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 静态文件缓存（可选，如果 Next.js 的公开文件）
    # location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    #     proxy_pass http://nextjs_frontend;
    #     proxy_cache_valid 200 30d;
    #     expires 30d;
    #     add_header Cache-Control "public, immutable";
    # }
}


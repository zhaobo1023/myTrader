# 07_sentiment.yaml - 日维度舆情监控任务
# 每天收盘后依次执行，写入 online DB

tasks:
  - id: fetch_fear_index
    name: "恐慌指数 VIX/OVX/GVZ/US10Y"
    module: scheduler.adapters
    func: run_sentiment_fear_index
    tags: [sentiment, daily]
    schedule: "18:30"
    depends_on: []
    params:
      env: online
    retry:
      max_attempts: 3
      delay_seconds: 60
    timeout_seconds: 120
    alert_on_failure: false

  - id: fetch_stock_announcements
    name: "持仓/watchlist个股公告抓取+LLM分析"
    module: scheduler.adapters
    func: run_announcement_fetch
    tags: [sentiment, daily]
    schedule: "19:00"
    depends_on:
      - fetch_fear_index
    params:
      env: online
    retry:
      max_attempts: 2
      delay_seconds: 60
    timeout_seconds: 1800
    alert_on_failure: false

  - id: fetch_news_sentiment
    name: "重点股新闻情感分析"
    module: scheduler.adapters
    func: run_sentiment_news
    tags: [sentiment, daily]
    schedule: "19:30"
    depends_on:
      - fetch_stock_announcements
    params:
      env: online
      stock_codes: "002594,600519,000858,601318"
      days: 1
    retry:
      max_attempts: 2
      delay_seconds: 60
    timeout_seconds: 600
    alert_on_failure: false

  - id: fetch_event_signals
    name: "关键词事件信号检测"
    module: scheduler.adapters
    func: run_sentiment_events
    tags: [sentiment, daily]
    schedule: "19:40"
    depends_on:
      - fetch_news_sentiment
    params:
      env: online
      keywords: "资产重组,回购,业绩预增,业绩预减,减持,违规,退市"
      days: 1
    retry:
      max_attempts: 2
      delay_seconds: 60
    timeout_seconds: 300
    alert_on_failure: false

  - id: fetch_polymarket
    name: "Polymarket 聪明钱信号"
    module: scheduler.adapters
    func: run_sentiment_polymarket
    tags: [sentiment, daily]
    schedule: "19:30"
    depends_on: []
    params:
      env: online
      keywords: "tariff,fed,election,china,oil"
      min_volume: 1000000
    retry:
      max_attempts: 2
      delay_seconds: 60
    timeout_seconds: 120
    alert_on_failure: false

# 02_macro.yaml - Macro data fetching and factor calculation
# Schedule: runs before market data gate

tasks:
  - id: fetch_macro_data
    name: "Fetch macro indicators"
    module: data_analyst.fetchers.macro_fetcher
    func: fetch_all_indicators
    tags: [macro, daily]
    schedule: "17:30"
    depends_on: []
    params: {}

  - id: calc_macro_factors
    name: "Calculate macro factors"
    module: data_analyst.factors.macro_factor_calculator
    func: incremental_update
    tags: [macro, factor, daily]
    schedule: "after_gate"
    depends_on:
      - fetch_macro_data
    params: {}

  - id: fetch_dashboard_data
    name: "Fetch market dashboard indicators"
    module: data_analyst.market_dashboard.fetcher
    func: fetch_all
    tags: [macro, dashboard, daily]
    schedule: "17:00"
    depends_on: []
    params:
      env: online
    retry:
      max_attempts: 2
      delay_seconds: 60
    timeout_seconds: 300

  - id: calc_market_overview
    name: "Compute market overview signals"
    module: data_analyst.market_overview.calculator
    func: compute_all
    tags: [macro, market_overview, daily]
    schedule: "after_gate"
    depends_on:
      - fetch_macro_data
      - fetch_dashboard_data
    params: {}

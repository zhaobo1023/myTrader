# 04_indicators.yaml - Technical indicators, RPS, SVD, LogBias
# These run after the daily data gate

tasks:
  - id: calc_rps
    name: "Calculate RPS (Relative Price Strength)"
    module: data_analyst.indicators.rps_calculator
    func: rps_daily_update
    tags: [indicator, daily]
    schedule: "after_gate"
    depends_on:
      - _gate_daily_price
    params:
      env: online

  - id: calc_svd_monitor
    name: "SVD market state monitor"
    module: data_analyst.market_monitor.run_monitor
    func: run_daily_monitor
    tags: [indicator, daily]
    schedule: "after_gate"
    depends_on:
      - _gate_daily_price
    params: {}

  - id: calc_log_bias
    name: "Log bias signal detection"
    module: scheduler.adapters
    func: run_log_bias
    tags: [indicator, daily]
    schedule: "after_gate"
    depends_on:
      - _gate_daily_price
    params: {}

  - id: calc_technical_indicator
    name: "Technical indicators (MA/MACD/RSI/KDJ)"
    module: scheduler.adapters
    func: run_technical_indicator_scan
    tags: [indicator, daily]
    schedule: "after_gate"
    depends_on:
      - _gate_daily_price
    params: {}

  - id: monitor_candidate_pool
    name: "Candidate pool daily monitor + Feishu push"
    module: scheduler.adapters
    func: monitor_candidate_pool
    tags: [indicator, daily, candidate]
    schedule: "after_gate"
    depends_on:
      - _gate_daily_price
      - calc_technical_indicator
    params:
      env: online
    retry:
      max_attempts: 2
      delay_seconds: 60
    timeout_seconds: 300

  - id: calc_sw_industry_valuation
    name: "SW industry valuation percentile (PE/PB/score)"
    module: data_analyst.fetchers.sw_industry_valuation_fetcher
    func: run_daily
    tags: [indicator, daily, valuation]
    schedule: "after_gate"
    depends_on:
      - _gate_daily_price
    params: {}
    timeout_seconds: 300

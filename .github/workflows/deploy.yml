name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # needed for git diff HEAD~1

      - name: Deploy to ECS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /root/app

            # ── 1. Pull latest code ──────────────────────────────────────
            echo "[1/4] Pulling latest code..."
            git pull origin main

            # ── 2. Restart API (volume-mounted, no rebuild needed) ───────
            echo "[2/4] Restarting API container..."
            docker restart mytrader-api
            # Wait for healthy
            for i in $(seq 1 20); do
              sleep 2
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' mytrader-api 2>/dev/null || echo "none")
              if [ "$STATUS" = "healthy" ]; then
                echo "  API healthy after ${i}x2s"
                break
              fi
              if [ "$i" = "20" ]; then
                echo "[ERROR] API did not become healthy in 40s"
                docker logs --tail 30 mytrader-api
                exit 1
              fi
            done

            # ── 3. Rebuild & restart Web only when web/ files changed ────
            echo "[3/4] Checking frontend changes..."
            if git diff --name-only HEAD~1 HEAD | grep -q '^web/'; then
              echo "  web/ changed — rebuilding image..."
              docker build --no-cache -t mytrader-web:latest ./web
              docker stop mytrader-web && docker rm mytrader-web
              docker run -d \
                --name mytrader-web \
                --network app_mytrader-network \
                -p 127.0.0.1:3000:3000 \
                -e NEXT_PUBLIC_API_BASE_URL=http://123.56.3.1:8000 \
                --restart unless-stopped \
                mytrader-web:latest
              echo "  Web container restarted with new image."
            else
              echo "  No web/ changes — skipping frontend rebuild."
            fi

            # ── 4. Health check ──────────────────────────────────────────
            echo "[4/4] Final health check..."
            curl -sf http://localhost:8000/health \
              || { echo "[ERROR] API health check failed"; exit 1; }
            echo "[SUCCESS] Deploy completed."

name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect frontend changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^web/'; then
            echo "web=true" >> $GITHUB_OUTPUT
          else
            echo "web=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.ECS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.ECS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to ECS
        env:
          WEB_CHANGED: ${{ steps.changes.outputs.web }}
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            scripts/deploy_remote.sh \
            ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}:/tmp/deploy_remote.sh

          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=no \
            ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }} \
            "WEB_CHANGED=${WEB_CHANGED} POSTHOG_KEY='${POSTHOG_KEY}' POSTHOG_HOST='${POSTHOG_HOST}' bash /tmp/deploy_remote.sh"

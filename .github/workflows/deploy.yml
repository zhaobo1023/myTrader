name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to ECS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            set -e
            echo "[INFO] Starting deployment..."

            cd /opt/myTrader

            # 1. Git pull
            echo "[INFO] Pulling latest code..."
            git pull origin main

            # 2. Install Python dependencies
            echo "[INFO] Installing dependencies..."
            pip install -q -r requirements.txt

            # 3. Build frontend (if changed)
            echo "[INFO] Building frontend..."
            cd web && npm ci && npm run build && cd ..

            # 4. Database migration
            echo "[INFO] Running migrations..."
            alembic upgrade head

            # 5. Restart services via systemd
            echo "[INFO] Restarting services..."
            sudo systemctl restart mytrader-api
            sudo systemctl restart mytrader-web

            # 6. Wait and health check
            echo "[INFO] Waiting for services..."
            sleep 3

            echo "[INFO] Checking API health..."
            curl -sf http://localhost:8000/health || { echo "API health check failed"; exit 1; }

            echo "[SUCCESS] Deploy completed"

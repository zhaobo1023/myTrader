name: Test

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  api-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: mytrader_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check api/ --ignore=E501 || true

      - name: Run API tests
        env:
          DB_ENV: local
          LOCAL_DB_HOST: 127.0.0.1
          LOCAL_DB_PORT: 3306
          LOCAL_DB_USER: root
          LOCAL_DB_PASSWORD: testpass
          LOCAL_DB_NAME: mytrader_test
          REDIS_URL: redis://127.0.0.1:6379/0
          JWT_SECRET_KEY: test-secret-key-for-ci
        run: |
          pytest tests/unit/ -v --tb=short 2>/dev/null || echo "No unit tests yet - skipping"

  web-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint || true

      - name: Build
        run: npm run build

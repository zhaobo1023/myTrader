<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>myTrader - Under Maintenance</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0a0a;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
.container{text-align:center;padding:40px 20px}
h2{font-size:24px;font-weight:600;margin-bottom:12px;color:#fff}
p{font-size:16px;color:#888;line-height:1.6}
.dot{display:inline-block;animation:pulse 1.5s infinite}
.dot:nth-child(2){animation-delay:.3s}
.dot:nth-child(3){animation-delay:.6s}
@keyframes pulse{0%,80%,100%{opacity:.3}40%{opacity:1}}
</style>
</head>
<body>
<div class="container">
<h2>myTrader</h2>
<p>Under maintenance<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></p>
</div>
</body>
</html>

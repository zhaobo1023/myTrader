# myTrader Docker Compose - Phase 0
# Usage: make dev | make prod

services:
  # ============================================================
  # FastAPI - Backend API
  # ============================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mytrader-api
    command: >
      sh -c "pip install python-multipart 2>/dev/null;
      uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 2"
    ports:
      - "127.0.0.1:8000:8000"  # 仅本机可访问，外部通过 nginx 反代
    volumes:
      - .:/app
      - ./output:/app/output
    env_file:
      - .env
    environment:
      - REDIS_HOST=mytrader-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - mytrader-network

  # ============================================================
  # Next.js - Frontend
  # ============================================================
  web:
    image: mytrader-web
    container_name: mytrader-web
    command: npm start
    working_dir: /app
    networks:
      - mytrader-network
    restart: unless-stopped

  # ============================================================
  # Nginx - Reverse Proxy
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: mytrader-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx_logs:/var/log/nginx
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    restart: unless-stopped
    networks:
      - mytrader-network

  # ============================================================
  # Celery Worker - Async Task Execution
  # ============================================================
  celery-worker:
    build: .
    command: celery -A api.tasks.celery_app worker -l info -c 1 -Q celery,default
    env_file: .env
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    environment:
      - REDIS_HOST=mytrader-redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - .:/app
      - ./output:/app/output
      - /root/wechat2rss/data:/root/wechat2rss/data:ro
    healthcheck:
      test: ["CMD", "celery", "-A", "api.tasks.celery_app", "inspect", "ping", "--timeout", "10"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - mytrader-network

  # ============================================================
  # Celery Beat - Periodic Task Scheduler
  # ============================================================
  celery-beat:
    build: .
    command: >
      sh -c "rm -f /app/celerybeat-schedule &&
      celery -A api.tasks.celery_app beat -l info --scheduler celery.beat.PersistentScheduler"
    env_file: .env
    environment:
      - REDIS_HOST=mytrader-redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import redis, os; r=redis.Redis(host=os.environ.get('REDIS_HOST','localhost'), port=6379, password=os.environ.get('REDIS_PASSWORD',''), db=1); r.ping()"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - mytrader-network

volumes:
  nginx_logs:

networks:
  mytrader-network:
    driver: bridge

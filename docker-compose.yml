# myTrader Docker Compose - Phase 0
# Usage: make dev | make prod

services:
  # ============================================================
  # FastAPI - Backend API
  # ============================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mytrader-api
    command: >
      sh -c "pip install python-multipart 2>/dev/null;
      uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 2"
    ports:
      - "127.0.0.1:8000:8000"  # 仅本机可访问，外部通过 nginx 反代
    volumes:
      - .:/app
      - ./output:/app/output
    env_file:
      - .env
    environment:
      - REDIS_HOST=mytrader-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - mytrader-network

  # ============================================================
  # Next.js - Frontend (可选，如果使用 Docker 部署前端)
  # ============================================================
  # nextjs:
  #   build:
  #     context: ./web
  #     dockerfile: Dockerfile
  #   container_name: mytrader-nextjs
  #   ports:
  #     - "127.0.0.1:3000:3000"
  #   environment:
  #     - NODE_ENV=production
  #     - NEXT_PUBLIC_API_URL=http://127.0.0.1:8000
  #   depends_on:
  #     - api
  #   restart: unless-stopped
  #   networks:
  #     - mytrader-network

  # ============================================================
  # Nginx - Reverse Proxy
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: mytrader-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx_logs:/var/log/nginx
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mytrader-network

  # ============================================================
  # Celery Worker - Async Task Execution
  # ============================================================
  celery-worker:
    build: .
    command: celery -A api.tasks.celery_app worker -l info -c 1 -Q celery,default
    env_file: .env
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    environment:
      - REDIS_HOST=mytrader-redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - .:/app
      - ./output:/app/output
      - /root/wechat2rss/data:/root/wechat2rss/data:ro
    restart: unless-stopped
    networks:
      - mytrader-network

  # ============================================================
  # Celery Beat - Periodic Task Scheduler
  # ============================================================
  celery-beat:
    build: .
    command: celery -A api.tasks.celery_app beat -l info --scheduler celery.beat.PersistentScheduler
    env_file: .env
    environment:
      - REDIS_HOST=mytrader-redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - .:/app
    restart: unless-stopped
    networks:
      - mytrader-network

volumes:
  nginx_logs:

networks:
  mytrader-network:
    driver: bridge
